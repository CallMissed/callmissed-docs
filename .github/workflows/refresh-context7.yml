name: Refresh Context7

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "context7.json"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Refresh Context7 index
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://context7.com/api/v1/refresh" \
            -H "Authorization: Bearer ${{ secrets.CONTEXT7_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"libraryName\": \"/callmissed/callmissed-docs\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP $HTTP_CODE: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Context7 refresh triggered for /callmissed/callmissed-docs"
            exit 0
          fi

          # Unclaimed libraries are rate-limited to one refresh per 10 days.
          # A "too-early" response is expected and not a failure - the docs repo
          # is already up to date; Context7 will re-index on its own schedule.
          if echo "$BODY" | grep -q "too-early"; then
            echo "Refresh throttled (min 10 days between updates) - docs are current, skipping."
            exit 0
          fi

          echo "Refresh failed with HTTP $HTTP_CODE"
          exit 1