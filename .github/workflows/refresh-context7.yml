name: Refresh Context7

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "context7.json"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Refresh Context7 index
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://context7.com/api/v1/refresh" \
            -H "Authorization: Bearer ${{ secrets.CONTEXT7_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"libraryName\": \"/callmissed/callmissed-docs\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP $HTTP_CODE: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Context7 refresh triggered for /callmissed/callmissed-docs"
          else
            echo "Refresh returned HTTP $HTTP_CODE"
            exit 1
          fi