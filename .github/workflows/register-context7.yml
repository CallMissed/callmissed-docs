name: Register on Context7 (run once)

on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Add repo to Context7
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://context7.com/api/v2/add/repo/github" \
            -H "Authorization: Bearer ${{ secrets.CONTEXT7_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"docsRepoUrl\": \"https://github.com/CallMissed/callmissed-docs\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP $HTTP_CODE: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Registered. Library ID: /callmissed/callmissed-docs"
          else
            echo "Registration failed with HTTP $HTTP_CODE"
            exit 1
          fi